<style>
:root {
  --green-900: #004D16;
  --green-800: #006B1F;
  --green-700: #008A28;
  --green-600: #00A82D;
  --green-500: #2DB84D;
  --green-400: #5CC872;
  --green-300: #8DD89A;
  --green-200: #BDE8C4;
  --green-100: #E0F5E3;
  --green-50: #F0FAF2;
  --gray-900: #1A1D1B;
  --gray-800: #2D302E;
  --gray-700: #444845;
  --gray-600: #5C615D;
  --gray-500: #7A7F7B;

}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--gray-100);
  color: var(--gray-900);
  overscroll-behavior: none;
  -webkit-font-smoothing: antialiased;
}

#root {
  max-width: 480px;
  margin: 0 auto;
  min-height: 100dvh;
  background: var(--white);
  position: relative;
  overflow-x: hidden;
}

#loading-fallback {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100dvh;
  max-width: 480px;
  margin: 0 auto;
  background: var(--white);
  font-family: 'DM Sans', sans-serif;
}

#loading-fallback .spinner {
  width: 40px; height: 40px;
  border: 3px solid var(--green-200);
  border-top-color: var(--green-600);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

#loading-fallback p { margin-top: 16px; color: var(--gray-500); font-size: 14px; }

#error-fallback {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100dvh;
  max-width: 480px;
  margin: 0 auto;
  background: var(--white);
  padding: 24px;
  text-align: center;
  font-family: 'DM Sans', sans-serif;
}

#error-fallback h2 { color: var(--red-500); margin-bottom: 8px; }
#error-fallback p { color: var(--gray-600); font-size: 14px; }

.fade-in { animation: fadeIn 0.25s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

.slide-up { animation: slideUp 0.3s cubic-bezier(0.32,0.72,0,1); }
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

.slide-right { animation: slideRight 0.25s cubic-bezier(0.32,0.72,0,1); }
@keyframes slideRight { from { transform: translateX(100%); opacity:0.5; } to { transform: translateX(0); opacity:1; } }

input, textarea, button, select { font-family: inherit; }

::-webkit-scrollbar { width: 0; }
</style>
</head>

// ─── Data Context ───
const STORAGE_KEY = 'notevault_data';
const defaultData = {
  notes: [],
  notebooks: ['Personal', 'Work', 'Ideas'],
  tags: ['important', 'todo', 'reference'],
};

const DataContext = createContext();

function generateId() {
  return Date.now().toString(36) + Math.random().toString(36).substr(2,6);
}

function DataProvider({ children }) {
  const [data, setData] = useState(() => {
    try {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        const parsed = JSON.parse(saved);
        return { ...defaultData, ...parsed };
      }
    } catch(e) {}
    return defaultData;
  });

  useEffect(() => {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) {}
  }, [data]);

  const addNote = useCallback((note) => {
    const newNote = {
      id: generateId(),
      title: '',
      content: '',
      notebook: 'Personal',
      tags: [],
      pinned: false,
      favorite: false,
      trashed: false,
      createdAt: Date.now(),
      updatedAt: Date.now(),
      ...note,
    };
    setData(d => ({ ...d, notes: [newNote, ...d.notes] }));
    return newNote.id;
  }, []);

  const updateNote = useCallback((id, updates) => {
    setData(d => ({
      ...d,
      notes: d.notes.map(n => n.id === id ? { ...n, ...updates, updatedAt: Date.now() } : n)
    }));
  }, []);

  const trashNote = useCallback((id) => {
    setData(d => ({
      ...d,
      notes: d.notes.map(n => n.id === id ? { ...n, trashed: true, updatedAt: Date.now() } : n)
    }));
  }, []);

  const restoreNote = useCallback((id) => {
    setData(d => ({
      ...d,
      notes: d.notes.map(n => n.id === id ? { ...n, trashed: false, updatedAt: Date.now() } : n)
    }));
  }, []);

  const deleteNotePermanently = useCallback((id) => {
    setData(d => ({ ...d, notes: d.notes.filter(n => n.id !== id) }));
  }, []);

  const emptyTrash = useCallback(() => {
    setData(d => ({ ...d, notes: d.notes.filter(n => !n.trashed) }));
  }, []);

  const addNotebook = useCallback((name) => {
    if (name && !data.notebooks.includes(name)) {
      setData(d => ({ ...d, notebooks: [...d.notebooks, name] }));
    }
  }, [data.notebooks]);

  const deleteNotebook = useCallback((name) => {
    setData(d => ({
      ...d,
      notebooks: d.notebooks.filter(n => n !== name),
      notes: d.notes.map(n => n.notebook === name ? { ...n, notebook: 'Personal' } : n),
    }));
  }, []);

  const addTag = useCallback((tag) => {
    const t = tag.toLowerCase().trim();
    if (t && !data.tags.includes(t)) {
      setData(d => ({ ...d, tags: [...d.tags, t] }));
    }
  }, [data.tags]);

  const deleteTag = useCallback((tag) => {
    setData(d => ({
      ...d,
      tags: d.tags.filter(t => t !== tag),
      notes: d.notes.map(n => ({ ...n, tags: n.tags.filter(t => t !== tag) })),
    }));
  }, []);

  const exportData = useCallback(() => {
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `notevault-backup-${new Date().toISOString().slice(0,10)}.json`;
    a.click(); URL.revokeObjectURL(url);
  }, [data]);

  const importData = useCallback((json) => {
    try {
      const parsed = JSON.parse(json);
      if (parsed.notes) {
        setData({ ...defaultData, ...parsed });
        return true;
      }
    } catch(e) {}
    return false;
  }, []);

  const value = useMemo(() => ({
    ...data, addNote, updateNote, trashNote, restoreNote,
    deleteNotePermanently, emptyTrash, addNotebook, deleteNotebook,
    addTag, deleteTag, exportData, importData,
  }), [data, addNote, updateNote, trashNote, restoreNote, deleteNotePermanently, emptyTrash, addNotebook, deleteNotebook, addTag, deleteTag, exportData, importData]);

  return <DataContext.Provider value={value}>{children}</DataContext.Provider>;
}

function useData() { return useContext(DataContext); }

// ─── Utility: strip HTML for preview ───
function stripHtml(html) {
  if (!html) return '';
  return html.replace(/<[^>]*>/g, ' ').replace(/\s+/g, ' ').trim();
}

function formatDate(ts) {
  const d = new Date(ts);
  const now = new Date();
  const diff = now - d;
  if (diff < 60000) return 'Just now';
  if (diff < 3600000) return Math.floor(diff/60000) + 'm ago';
  if (diff < 86400000) return Math.floor(diff/3600000) + 'h ago';
  if (diff < 604800000) return Math.floor(diff/86400000) + 'd ago';
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

// ─── Note Card ───
function NoteCard({ note, onClick }) {
  const preview = stripHtml(note.content);
  return (
    <div style={S.card} onClick={onClick} className="fade-in">
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={S.cardTitle}>{note.title || 'Untitled Note'}</div>
          <div style={S.cardPreview}>{preview || 'No content'}</div>
        </div>
        <div style={{ display: 'flex', gap: 2, marginLeft: 8, flexShrink: 0, paddingTop: 2 }}>
          {note.pinned && <span style={{ color: 'var(--green-600)' }}><Icons.Pin filled /></span>}
          {note.favorite && <Icons.Star filled />}
        </div>
      </div>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginTop: 8 }}>
        <div style={{ display: 'flex', flexWrap: 'wrap' }}>
          {note.tags.slice(0,3).map(t => (
            <span key={t} style={S.tagChip}><Icons.Tag />{t}</span>
          ))}
        </div>
        <span style={{ fontSize: 11, color: 'var(--gray-400)' }}>{formatDate(note.updatedAt)}</span>
      </div>
    </div>
  );
}

// ─── Rich Text Editor ───
function RichEditor({ content, onChange, autoFocus }) {
  const editorRef = useRef(null);
  const lastContent = useRef(content);

  useEffect(() => {
    if (editorRef.current && content !== lastContent.current) {
      editorRef.current.innerHTML = content || '';
      lastContent.current = content;
    }
  }, [content]);

  useEffect(() => {
    if (autoFocus && editorRef.current) {
      setTimeout(() => editorRef.current.focus(), 100);
    }
  }, [autoFocus]);

  const handleInput = useCallback(() => {
    const html = editorRef.current.innerHTML;
    lastContent.current = html;
    onChange(html);
  }, [onChange]);

  const exec = useCallback((cmd, val) => {
    document.execCommand(cmd, false, val || null);
    editorRef.current.focus();
    handleInput();
  }, [handleInput]);

  const toolBtn = (icon, cmd, val) => (
    <button style={{ ...S.btn, width: 38, height: 38, color: 'var(--gray-700)' }}
      onMouseDown={e => e.preventDefault()} onClick={() => exec(cmd, val)}>
      {icon}
    </button>
  );

  return (
    <div>
      <div style={{
        display: 'flex', gap: 2, padding: '6px 8px',
        borderBottom: '1px solid var(--gray-100)',
        overflowX: 'auto', flexWrap: 'nowrap',
        background: 'var(--gray-50)', borderRadius: '10px 10px 0 0',
        position: 'sticky', top: 0, zIndex: 5,
      }}>
        {toolBtn(<Icons.Bold />, 'bold')}
        {toolBtn(<Icons.Italic />, 'italic')}
        {toolBtn(<Icons.Heading />, 'formatBlock', '<h2>')}
        {toolBtn(<Icons.List />, 'insertUnorderedList')}
        {toolBtn(<Icons.OrderedList />, 'insertOrderedList')}
        {toolBtn(<Icons.Check />, 'insertHTML', '<div style="display:flex;align-items:center;gap:6px"><input type="checkbox" style="width:18px;height:18px;accent-color:var(--green-600)"><span>Task</span></div>')}
      </div>
      <div
        ref={editorRef}
        contentEditable
        suppressContentEditableWarning
        onInput={handleInput}
        dangerouslySetInnerHTML={{ __html: content || '' }}
        style={{
          minHeight: 300, padding: 16, outline: 'none',
          fontSize: 15, lineHeight: 1.7,
          color: 'var(--gray-800)',
          fontFamily: "'Source Serif 4', serif",
        }}
      />
    </div>
  );
}

// ─── Note Editor Screen ───
function NoteEditor({ noteId, onBack }) {
  const { notes, updateNote, trashNote, addTag, tags } = useData();
  const note = notes.find(n => n.id === noteId);
  const [showMenu, setShowMenu] = useState(false);
  const [showTagInput, setShowTagInput] = useState(false);
  const [tagInput, setTagInput] = useState('');

  if (!note) return null;

  const toggleTag = (tag) => {
    const newTags = note.tags.includes(tag)
      ? note.tags.filter(t => t !== tag)
      : [...note.tags, tag];
    updateNote(noteId, { tags: newTags });
  };

  const handleAddTag = () => {
    const t = tagInput.toLowerCase().trim();
    if (t) {
      addTag(t);
      if (!note.tags.includes(t)) updateNote(noteId, { tags: [...note.tags, t] });
      setTagInput('');
      setShowTagInput(false);
    }
  };

  return (
    <div className="slide-right" style={{ position: 'absolute', inset: 0, zIndex: 30, background: 'var(--white)' }}>
      {/* Editor Header */}
      <div style={{
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        padding: '12px 8px', paddingTop: 'calc(12px + var(--safe-top))',
        borderBottom: '1px solid var(--gray-100)',
        background: 'var(--white)', position: 'sticky', top: 0, zIndex: 10,
      }}>
        <button style={S.btn} onClick={onBack}><Icons.Back /></button>
        <div style={{ display: 'flex', gap: 4 }}>
          <button style={{ ...S.btn, color: note.pinned ? 'var(--green-600)' : 'var(--gray-400)' }}
            onClick={() => updateNote(noteId, { pinned: !note.pinned })}>
            <Icons.Pin filled={note.pinned} />
          </button>
          <button style={{ ...S.btn, color: note.favorite ? 'var(--amber-500)' : 'var(--gray-400)' }}
            onClick={() => updateNote(noteId, { favorite: !note.favorite })}>
            <Icons.Star filled={note.favorite} />
          </button>
          <button style={{ ...S.btn, color: 'var(--gray-500)' }} onClick={() => setShowMenu(!showMenu)}>
            <Icons.More />
          </button>
        </div>
      </div>

      {/* Dropdown Menu */}
      {showMenu && (
        <div style={{
          position: 'absolute', right: 16, top: 'calc(56px + var(--safe-top))',
          background: 'var(--white)', borderRadius: 12, padding: 8,
          boxShadow: '0 8px 30px rgba(0,0,0,0.12)', zIndex: 50,
          minWidth: 180, border: '1px solid var(--gray-100)',
        }}>
          <button style={{ ...S.btn, width: '100%', justifyContent: 'flex-start', gap: 10, padding: '10px 12px', fontSize: 14, color: 'var(--gray-700)' }}
            onClick={() => { setShowMenu(false); setShowTagInput(!showTagInput); }}>
            <Icons.Tag /> Manage Tags
          </button>
          <button style={{ ...S.btn, width: '100%', justifyContent: 'flex-start', gap: 10, padding: '10px 12px', fontSize: 14, color: 'var(--red-500)' }}
            onClick={() => { trashNote(noteId); onBack(); }}>
            <Icons.Trash /> Move to Trash
          </button>
        </div>
      )}

      {/* Notebook selector */}
      <div style={{ padding: '8px 16px', borderBottom: '1px solid var(--gray-50)', display: 'flex', alignItems: 'center', gap: 8 }}>
        <Icons.Folder />
        <select value={note.notebook} onChange={e => updateNote(noteId, { notebook: e.target.value })}
          style={{
            border: 'none', background: 'none', fontSize: 13, fontWeight: 500,
            color: 'var(--green-700)', padding: '4px 0', outline: 'none', cursor: 'pointer',
          }}>
          {useData().notebooks.map(nb => <option key={nb} value={nb}>{nb}</option>)}
        </select>
      </div>

      {/* Tags */}
      <div style={{ padding: '6px 16px', display: 'flex', flexWrap: 'wrap', gap: 4, alignItems: 'center' }}>
        {note.tags.map(t => (
          <span key={t} style={{ ...S.tagChip, cursor: 'pointer' }} onClick={() => toggleTag(t)}>
            <Icons.Tag />{t} ×
          </span>
        ))}
        {showTagInput ? (
          <div style={{ display: 'flex', gap: 4, alignItems: 'center' }}>
            <input value={tagInput} onChange={e => setTagInput(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && handleAddTag()}
              placeholder="tag name"
              autoFocus
              style={{
                border: '1px solid var(--green-300)', borderRadius: 6, padding: '4px 8px',
                fontSize: 12, width: 100, outline: 'none',
              }} />
            <button onClick={handleAddTag} style={{ fontSize: 12, color: 'var(--green-600)', background: 'none', border: 'none', fontWeight: 600, cursor: 'pointer' }}>Add</button>
          </div>
        ) : (
          <button style={{ ...S.tagChip, background: 'var(--gray-100)', color: 'var(--gray-500)', cursor: 'pointer', border: 'none' }}
            onClick={() => setShowTagInput(true)}>+ tag</button>
        )}
      </div>

      {/* Available tags */}
      {showTagInput && tags.filter(t => !note.tags.includes(t)).length > 0 && (
        <div style={{ padding: '0 16px 8px', display: 'flex', flexWrap: 'wrap', gap: 4 }}>
          {tags.filter(t => !note.tags.includes(t)).map(t => (
            <button key={t} onClick={() => toggleTag(t)}
              style={{ ...S.tagChip, background: 'var(--gray-50)', color: 'var(--gray-600)', cursor: 'pointer', border: '1px dashed var(--gray-300)' }}>
              + {t}
            </button>
          ))}
        </div>
      )}

      {/* Title */}
      <div style={{ padding: '12px 16px 0' }}>
        <input
          value={note.title}
          onChange={e => updateNote(noteId, { title: e.target.value })}
          placeholder="Note title"
          style={{
            border: 'none', outline: 'none', width: '100%',
            fontSize: 22, fontWeight: 700,
            fontFamily: "'Source Serif 4', serif",
            color: 'var(--gray-900)',
          }}
        />
      </div>

      {/* Editor */}
      <div style={{ padding: '0 16px 120px' }}>
        <RichEditor
          content={note.content}
          onChange={(html) => updateNote(noteId, { content: html })}
        />
      </div>
    </div>
  );
}

// ─── Home Tab ───
function HomeTab({ onOpenNote }) {
  const { notes, addNote } = useData();
  const [filter, setFilter] = useState('all');
  const activeNotes = useMemo(() => notes.filter(n => !n.trashed), [notes]);

  const filtered = useMemo(() => {
    let list = activeNotes;
    if (filter === 'pinned') list = list.filter(n => n.pinned);
    if (filter === 'favorites') list = list.filter(n => n.favorite);
    // sort: pinned first, then by updatedAt
    return list.sort((a, b) => {
      if (a.pinned !== b.pinned) return b.pinned ? 1 : -1;
      return b.updatedAt - a.updatedAt;
    });
  }, [activeNotes, filter]);

  const handleNew = () => {
    const id = addNote({});
    onOpenNote(id);
  };

  const filterBtn = (label, key) => (
    <button onClick={() => setFilter(key)} style={{
      padding: '6px 14px', borderRadius: 99, border: 'none',
      background: filter === key ? 'var(--green-600)' : 'var(--green-100)',
      color: filter === key ? 'white' : 'var(--green-700)',
      fontSize: 13, fontWeight: 600, cursor: 'pointer', minHeight: 34,
      transition: 'all 0.2s',
    }}>{label}</button>
  );

  return (
    <div style={S.content}>
      <div style={S.header}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <div>
            <div style={S.headerTitle}>NoteVault</div>
            <div style={{ fontSize: 13, opacity: 0.85, marginTop: 2 }}>{activeNotes.length} notes</div>
          </div>
          <button onClick={handleNew} style={{
            ...S.btn, background: 'rgba(255,255,255,0.2)', borderRadius: 12, width: 44, height: 44,
          }}>
            <Icons.Plus />
          </button>
        </div>
        <div style={{ display: 'flex', gap: 8, marginTop: 12 }}>
          {filterBtn('All', 'all')}
          {filterBtn('Pinned', 'pinned')}
          {filterBtn('Favorites', 'favorites')}
        </div>
      </div>

      <div style={{ padding: 16 }}>
        {filtered.length === 0 ? (
          <div style={{ textAlign: 'center', padding: 40, color: 'var(--gray-400)' }}>
            <div style={{ fontSize: 48, marginBottom: 12 }}>📝</div>
            <div style={{ fontSize: 15, fontWeight: 500 }}>No notes yet</div>
            <div style={{ fontSize: 13, marginTop: 4 }}>Tap + to create your first note</div>
          </div>
        ) : (
          filtered.map(n => <NoteCard key={n.id} note={n} onClick={() => onOpenNote(n.id)} />)
        )}
      </div>
    </div>
  );
}

// ─── Explore Tab ───
function ExploreTab({ onOpenNote }) {
  const { notes, notebooks, tags, addNote } = useData();
  const [view, setView] = useState('search'); // search | stats | templates
  const [query, setQuery] = useState('');
  const [filterNotebook, setFilterNotebook] = useState('');
  const [filterTag, setFilterTag] = useState('');

  const activeNotes = useMemo(() => notes.filter(n => !n.trashed), [notes]);

  const searchResults = useMemo(() => {
    if (!query && !filterNotebook && !filterTag) return [];
    return activeNotes.filter(n => {
      const matchQuery = !query || n.title.toLowerCase().includes(query.toLowerCase()) || stripHtml(n.content).toLowerCase().includes(query.toLowerCase());
      const matchNb = !filterNotebook || n.notebook === filterNotebook;
      const matchTag = !filterTag || n.tags.includes(filterTag);
      return matchQuery && matchNb && matchTag;
    }).sort((a, b) => b.updatedAt - a.updatedAt);
  }, [activeNotes, query, filterNotebook, filterTag]);

  // Stats
  const stats = useMemo(() => {
    const total = activeNotes.length;
    const pinned = activeNotes.filter(n => n.pinned).length;
    const faved = activeNotes.filter(n => n.favorite).length;
    const trashed = notes.filter(n => n.trashed).length;
    const totalWords = activeNotes.reduce((sum, n) => sum + stripHtml(n.content).split(/\s+/).filter(Boolean).length, 0);
    const byNotebook = {};
    notebooks.forEach(nb => { byNotebook[nb] = activeNotes.filter(n => n.notebook === nb).length; });
    const byTag = {};
    tags.forEach(t => { byTag[t] = activeNotes.filter(n => n.tags.includes(t)).length; });

    const today = new Date(); today.setHours(0,0,0,0);
    const weekAgo = today.getTime() - 7 * 86400000;
    const thisWeek = activeNotes.filter(n => n.createdAt >= weekAgo).length;

    return { total, pinned, faved, trashed, totalWords, byNotebook, byTag, thisWeek };
  }, [activeNotes, notes, notebooks, tags]);

  // Templates

    { name: 'Reading Notes', icon: '📖', content: '<h2>Reading Notes</h2><p><strong>Book/Article:</strong> </p><p><strong>Author:</strong> </p><h3>Key Ideas</h3><ul><li></li></ul><h3>Quotes</h3><p></p><h3>My Thoughts</h3><p></p>' },
    { name: 'Decision Matrix', icon: '⚖️', content: '<h2>Decision</h2><p><strong>What I need to decide:</strong> </p><h3>Option A</h3><p><strong>Pros:</strong></p><ul><li></li></ul><p><strong>Cons:</strong></p><ul><li></li></ul><h3>Option B</h3><p><strong>Pros:</strong></p><ul><li></li></ul><p><strong>Cons:</strong></p><ul><li></li></ul><h3>My Choice & Why</h3><p></p>' },
    { name: 'Weekly Review', icon: '📅', content: '<h2>Weekly Review</h2><p><strong>Week of:</strong> </p><h3>Wins</h3><ul><li></li></ul><h3>Challenges</h3><ul><li></li></ul><h3>Next Week Goals</h3><ol><li></li><li></li><li></li></ol>' },
  ];

  };

          <button style={{ ...S.btn, color: 'white' }} onClick={() => setSelected(null)}><Icons.Back /></button>
          <div>
            <div style={S.headerTitle}>{selected}</div>
            <div style={{ fontSize: 13, opacity: 0.85 }}>{nbNotes.length} notes</div>
          </div>
        </div>
        <div style={{ padding: 16 }}>
          {nbNotes.length === 0 && <div style={{ textAlign: 'center', padding: 40, color: 'var(--gray-400)', fontSize: 14 }}>No notes in this notebook</div>}
          {nbNotes.map(n => <NoteCard key={n.id} note={n} onClick={() => onOpenNote(n.id)} />)}
        </div>
      </div>
    );
  }

  return (
    <div style={S.content}>
      <div style={S.header}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <div style={S.headerTitle}>Notebooks</div>
          <button onClick={() => setShowAdd(!showAdd)} style={{ ...S.btn, background: 'rgba(255,255,255,0.2)', borderRadius: 12 }}>
            <Icons.Plus />
          </button>
        </div>
      </div>
      <div style={{ padding: 16 }}>
        {showAdd && (
          <div style={{ display: 'flex', gap: 8, marginBottom: 12 }} className="fade-in">
            <input value={newName} onChange={e => setNewName(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && handleAdd()}
              placeholder="Notebook name"
              autoFocus
              style={{
                flex: 1, padding: '12px 14px', borderRadius: 10,
                border: '2px solid var(--green-300)', outline: 'none', fontSize: 14,
              }} />
            <button onClick={handleAdd} style={{ ...S.btnPrimary, borderRadius: 10 }}>Add</button>
          </div>
        )}
        {notebooks.map(nb => {
          const count = activeNotes.filter(n => n.notebook === nb).length;
          return (
            <div key={nb} style={{
              ...S.card, display: 'flex', justifyContent: 'space-between', alignItems: 'center',
            }} onClick={() => setSelected(nb)}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                <div style={{
                  width: 42, height: 42, borderRadius: 10, background: 'var(--green-100)',
                  display: 'flex', alignItems: 'center', justifyContent: 'center', color: 'var(--green-600)',
                }}>
                  <Icons.Notebook />
                </div>
                <div>
                  <div style={{ fontSize: 15, fontWeight: 600 }}>{nb}</div>
                  <div style={{ fontSize: 12, color: 'var(--gray-500)' }}>{count} notes</div>
                </div>
              </div>
              {nb !== 'Personal' && (
                <button onClick={(e) => { e.stopPropagation(); if(confirm('Delete this notebook? Notes will move to Personal.')) deleteNotebook(nb); }}
                  style={{ ...S.btn, color: 'var(--gray-400)', width: 36, height: 36 }}>
                  <Icons.Trash />
                </button>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── Trash Tab ───
function TrashTab({ onOpenNote }) {
  const { notes, restoreNote, deleteNotePermanently, emptyTrash } = useData();
  const trashed = useMemo(() => notes.filter(n => n.trashed).sort((a, b) => b.updatedAt - a.updatedAt), [notes]);

  return (
    <div style={S.content}>
      <div style={S.header}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <div>
            <div style={S.headerTitle}>Trash</div>
            <div style={{ fontSize: 13, opacity: 0.85, marginTop: 2 }}>{trashed.length} notes</div>
          </div>
          {trashed.length > 0 && (
            <button onClick={() => { if(confirm('Permanently delete all trashed notes?')) emptyTrash(); }}
              style={{ fontSize: 13, color: 'white', background: 'rgba(255,255,255,0.2)', border: 'none', borderRadius: 8, padding: '8px 14px', cursor: 'pointer', fontWeight: 600 }}>
              Empty Trash
            </button>
          )}
        </div>
      </div>
      <div style={{ padding: 16 }}>
        {trashed.length === 0 && (
          <div style={{ textAlign: 'center', padding: 40, color: 'var(--gray-400)' }}>
            <div style={{ fontSize: 48, marginBottom: 8 }}>🗑️</div>
            <div style={{ fontSize: 15, fontWeight: 500 }}>Trash is empty</div>
          </div>
        )}
        {trashed.map(n => (
          <div key={n.id} style={S.card} className="fade-in">
            <div style={S.cardTitle}>{n.title || 'Untitled Note'}</div>
            <div style={S.cardPreview}>{stripHtml(n.content) || 'No content'}</div>
            <div style={{ display: 'flex', gap: 8, marginTop: 10 }}>
              <button onClick={() => restoreNote(n.id)} style={{
                display: 'flex', alignItems: 'center', gap: 6,
                padding: '8px 14px', borderRadius: 8, border: '1px solid var(--green-300)',
                background: 'var(--green-50)', color: 'var(--green-700)',
                fontSize: 13, fontWeight: 600, cursor: 'pointer',
              }}><Icons.Restore /> Restore</button>
              <button onClick={() => { if(confirm('Delete permanently?')) deleteNotePermanently(n.id); }} style={{
                display: 'flex', alignItems: 'center', gap: 6,
                padding: '8px 14px', borderRadius: 8, border: '1px solid var(--gray-200)',
                background: 'var(--white)', color: 'var(--red-500)',
                fontSize: 13, fontWeight: 600, cursor: 'pointer',
              }}><Icons.DeletePerm /> Delete</button>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── Settings Tab ───
function SettingsTab() {
  const { exportData, importData, notes, notebooks, tags } = useData();
  const [importStatus, setImportStatus] = useState('');
  const fileRef = useRef(null);

  const handleImport = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const success = importData(ev.target.result);
      setImportStatus(success ? 'Restore successful!' : 'Invalid backup file.');
      setTimeout(() => setImportStatus(''), 3000);
    };
    reader.readAsText(file);
  };

  const settingRow = (label, value) => (
    <div style={{ display: 'flex', justifyContent: 'space-between', padding: '14px 0', borderBottom: '1px solid var(--gray-100)' }}>
      <span style={{ fontSize: 14, color: 'var(--gray-700)' }}>{label}</span>
      <span style={{ fontSize: 14, fontWeight: 600, color: 'var(--green-700)' }}>{value}</span>
    </div>
  );

  return (
    <div style={S.content}>
      <div style={S.header}>
        <div style={S.headerTitle}>Settings</div>
      </div>
      <div style={{ padding: 16 }}>
        <div style={{ background: 'var(--gray-50)', borderRadius: 14, padding: 16, marginBottom: 16 }}>
          <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 8, color: 'var(--gray-800)' }}>Overview</div>
          {settingRow('Total Notes', notes.length)}
          {settingRow('Notebooks', notebooks.length)}
          {settingRow('Tags', tags.length)}
          {settingRow('Active Notes', notes.filter(n => !n.trashed).length)}
          {settingRow('Trashed', notes.filter(n => n.trashed).length)}
        </div>

        <div style={{ background: 'var(--gray-50)', borderRadius: 14, padding: 16, marginBottom: 16 }}>
          <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 12, color: 'var(--gray-800)' }}>Backup & Restore</div>
          <button onClick={exportData} style={{
            ...S.btnPrimary, width: '100%', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8, marginBottom: 10,
          }}>
            <Icons.Download /> Download Backup
          </button>
          <input type="file" accept=".json" ref={fileRef} onChange={handleImport} style={{ display: 'none' }} />
          <button onClick={() => fileRef.current.click()} style={{
            width: '100%', padding: '12px 20px', borderRadius: 10,
            border: '2px solid var(--green-300)', background: 'var(--green-50)',
            color: 'var(--green-700)', fontSize: 15, fontWeight: 600,
            cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8,
          }}>
            <Icons.Upload /> Restore from Backup
          </button>
          {importStatus && (
            <div style={{
              marginTop: 10, padding: '10px 14px', borderRadius: 8,
              background: importStatus.includes('successful') ? 'var(--green-100)' : 'var(--red-100)',
              color: importStatus.includes('successful') ? 'var(--green-700)' : 'var(--red-500)',
              fontSize: 13, fontWeight: 500, textAlign: 'center',
            }}>{importStatus}</div>
          )}
        </div>

        <div style={{ background: 'var(--gray-50)', borderRadius: 14, padding: 16 }}>
          <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 8, color: 'var(--gray-800)' }}>Manage Tags</div>
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
            {tags.map(t => (
              <span key={t} style={{ ...S.tagChip, fontSize: 13, padding: '4px 10px' }}>
                <Icons.Tag />{t}
                <button onClick={() => { if(confirm(`Delete tag "${t}"?`)) useData().deleteTag(t); }}
                  style={{ background: 'none', border: 'none', color: 'var(--green-700)', cursor: 'pointer', fontSize: 14, marginLeft: 4, padding: 0 }}>×</button>
              </span>
            ))}
            {tags.length === 0 && <span style={{ fontSize: 13, color: 'var(--gray-400)' }}>No tags created yet</span>}
          </div>
        </div>

        <div style={{ textAlign: 'center', marginTop: 32, color: 'var(--gray-400)', fontSize: 12 }}>
          NoteVault v1.0 · All data stored locally
        </div>
      </div>
    </div>
  );
}

// ─── Main App ───
function App() {
  const [tab, setTab] = useState('home');
  const [editingNote, setEditingNote] = useState(null);

  const navItem = (key, label, Icon) => (
    <button onClick={() => { setTab(key); setEditingNote(null); }}
      style={{
        flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center',
        gap: 3, padding: '8px 0', border: 'none', background: 'none', cursor: 'pointer',
        color: tab === key ? 'var(--green-600)' : 'var(--gray-400)',
        transition: 'color 0.2s', minHeight: 44,
      }}>
      <Icon />
      <span style={{ fontSize: 10, fontWeight: 600 }}>{label}</span>
    </button>
  );

  return (
    <div style={{ position: 'relative', minHeight: '100dvh' }}>
      {tab === 'home' && <HomeTab onOpenNote={setEditingNote} />}
      {tab === 'explore' && <ExploreTab onOpenNote={setEditingNote} />}
      {tab === 'notebooks' && <NotebooksTab onOpenNote={setEditingNote} />}
      {tab === 'trash' && <TrashTab />}
      {tab === 'settings' && <SettingsTab />}

      {editingNote && <NoteEditor noteId={editingNote} onBack={() => setEditingNote(null)} />}

      {/* Bottom Nav */}
      <div style={{
        position: 'fixed', bottom: 0, left: '50%', transform: 'translateX(-50%)',
        width: '100%', maxWidth: 480,
        background: 'var(--white)',
        borderTop: '1px solid var(--gray-100)',
        display: 'flex',
        paddingBottom: 'calc(6px + var(--safe-bottom))',
        paddingTop: 6,
        boxShadow: '0 -2px 10px rgba(0,0,0,0.04)',
        zIndex: 25,
      }}>
        {navItem('home', 'Notes', Icons.Home)}
        {navItem('explore', 'Explore', Icons.Explore)}
        {navItem('notebooks', 'Notebooks', Icons.Notebook)}
        {navItem('trash', 'Trash', Icons.Trash)}
        {navItem('settings', 'Settings', Icons.Settings)}
      </div>
    </div>
  );
}

// ─── Mount ───
try {
  document.getElementById('loading-fallback').style.display = 'flex';
  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(
    <DataProvider>
      <App />
    </DataProvider>
  );
  document.getElementById('loading-fallback').style.display = 'none';
} catch (err) {
  document.getElementById('loading-fallback').style.display = 'none';
  document.getElementById('error-fallback').style.display = 'flex';
  document.getElementById('error-msg').textContent = err.message;
}

// 8-second timeout fallback
setTimeout(() => {
  const root = document.getElementById('root');
  const loading = document.getElementById('loading-fallback');
  if (loading && loading.style.display !== 'none') {
    loading.innerHTML = '<p style="color:var(--red-500)">Loading took too long. Try refreshing.</p>';
  }
}, 8000);
</script>
</body>
</html>
