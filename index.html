<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>MX Player - Blue Edition</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #000;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  color: #fff;
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
}

.container {
  width: 100%;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

/* Video Player Section */
.video-section {
  flex: 1;
  position: relative;
  background: #000;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

video {
  max-width: 100%;
  max-height: 100%;
  width: auto;
  height: auto;
  transition: transform 0.3s ease;
}

video.zoom-1 { transform: scale(1); }
video.zoom-1-2 { transform: scale(1.2); }
video.zoom-1-5 { transform: scale(1.5); }

.video-no-file {
  text-align: center;
  color: #666;
  font-size: 16px;
}

/* Resume Popup */
.resume-popup {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(10, 10, 10, 0.95);
  border: 2px solid #2196F3;
  border-radius: 12px;
  padding: 24px;
  text-align: center;
  z-index: 100;
  display: none;
  min-width: 280px;
}

.resume-popup.show {
  display: block;
}

.resume-popup h3 {
  color: #2196F3;
  margin-bottom: 12px;
  font-size: 16px;
}

.resume-popup p {
  color: #aaa;
  margin-bottom: 16px;
  font-size: 13px;
}

.resume-popup-buttons {
  display: flex;
  gap: 12px;
  justify-content: center;
}

.resume-popup-buttons button {
  background: #2196F3;
  color: #fff;
  border: none;
  padding: 10px 20px;
  border-radius: 6px;
  cursor: pointer;
  font-weight: 600;
  font-size: 13px;
  transition: all 0.3s ease;
}

.resume-popup-buttons button:hover {
  background: #1976D2;
  box-shadow: 0 0 12px rgba(33, 150, 243, 0.6);
}

.resume-popup-buttons button.secondary {
  background: rgba(33, 150, 243, 0.2);
  color: #2196F3;
  border: 1px solid #2196F3;
}

.resume-popup-buttons button.secondary:hover {
  background: rgba(33, 150, 243, 0.4);
}

/* Controls Overlay */
.controls-overlay {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
  padding: 40px 16px 16px;
  opacity: 0;
  transition: opacity 0.3s ease;
  z-index: 10;
}

.controls-overlay.visible {
  opacity: 1;
}

/* BLUE PROGRESS BOX */
.progress-container {
  margin-bottom: 16px;
  cursor: pointer;
}

.progress-box {
  width: 100%;
  height: 8px;
  background: rgba(33, 150, 243, 0.2);
  border-radius: 6px;
  position: relative;
  overflow: hidden;
  border: 1px solid rgba(33, 150, 243, 0.4);
  box-shadow: 0 0 8px rgba(33, 150, 243, 0.3);
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #2196F3, #64B5F6);
  width: 0%;
  transition: width 0.1s linear;
  border-radius: 6px;
}

.progress-fill:hover {
  background: linear-gradient(90deg, #64B5F6, #90CAF9);
}

.progress-box:hover .progress-handle {
  opacity: 1;
}

.progress-handle {
  position: absolute;
  width: 14px;
  height: 14px;
  background: #2196F3;
  border-radius: 50%;
  top: -3px;
  left: 0%;
  box-shadow: 0 0 12px rgba(33, 150, 243, 0.8);
  opacity: 0;
  transition: opacity 0.3s ease;
}

.time-display {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: #888;
  margin-top: 8px;
  font-family: monospace;
}

/* Control Buttons */
.controls-buttons {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
}

.control-left {
  display: flex;
  gap: 12px;
  align-items: center;
}

.control-right {
  display: flex;
  gap: 8px;
  align-items: center;
}

.control-center {
  display: flex;
  gap: 8px;
  flex: 1;
  justify-content: center;
  align-items: center;
  flex-wrap: wrap;
}

button {
  background: none;
  border: none;
  color: #fff;
  font-size: 20px;
  cursor: pointer;
  padding: 8px;
  border-radius: 6px;
  transition: all 0.2s ease;
  display: flex;
  align-items: center;
  justify-content: center;
}

button:hover {
  background: rgba(33, 150, 243, 0.2);
}

button:active {
  background: rgba(33, 150, 243, 0.4);
}

.play-btn {
  width: 44px;
  height: 44px;
  background: rgba(33, 150, 243, 0.3);
  border: 2px solid #2196F3;
  font-size: 22px;
}

.play-btn:hover {
  background: rgba(33, 150, 243, 0.5);
  box-shadow: 0 0 12px rgba(33, 150, 243, 0.6);
}

/* Sliders */
.slider-container {
  display: flex;
  align-items: center;
  gap: 8px;
  min-width: 120px;
}

input[type="range"] {
  width: 80px;
  height: 2px;
  -webkit-appearance: none;
  appearance: none;
  background: rgba(33, 150, 243, 0.2);
  border-radius: 2px;
  outline: none;
  cursor: pointer;
}

input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 10px;
  height: 10px;
  background: #2196F3;
  border-radius: 50%;
  cursor: pointer;
  box-shadow: 0 0 6px rgba(33, 150, 243, 0.8);
}

input[type="range"]::-moz-range-thumb {
  width: 10px;
  height: 10px;
  background: #2196F3;
  border-radius: 50%;
  cursor: pointer;
  border: none;
  box-shadow: 0 0 6px rgba(33, 150, 243, 0.8);
}

.slider-label {
  font-size: 12px;
  color: #aaa;
  min-width: 20px;
}

/* File Input Section */
.file-section {
  background: #0a0a0a;
  padding: 12px 16px;
  border-top: 1px solid #2196F3;
  max-height: 120px;
  overflow-y: auto;
}

.file-input-wrapper {
  display: flex;
  gap: 10px;
  align-items: center;
  flex-wrap: wrap;
  margin-bottom: 10px;
}

.file-input-wrapper input[type="file"] {
  display: none;
}

.file-btn, .secondary-btn {
  background: #2196F3;
  color: #fff;
  padding: 8px 14px;
  border-radius: 4px;
  font-weight: 600;
  font-size: 12px;
  border: none;
  cursor: pointer;
  transition: all 0.3s ease;
}

.file-btn:hover, .secondary-btn:hover {
  background: #1976D2;
  box-shadow: 0 0 10px rgba(33, 150, 243, 0.5);
}

.file-name {
  font-size: 12px;
  color: #888;
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.file-clear {
  background: rgba(33, 150, 243, 0.2);
  color: #2196F3;
  padding: 6px 12px;
  border-radius: 4px;
  font-size: 12px;
  border: 1px solid #2196F3;
  cursor: pointer;
}

.file-clear:hover {
  background: rgba(33, 150, 243, 0.4);
}

/* Playlist */
.playlist-container {
  max-height: 100px;
  overflow-y: auto;
}

.playlist-item {
  background: rgba(33, 150, 243, 0.1);
  padding: 8px;
  border-radius: 4px;
  margin-bottom: 6px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 12px;
  cursor: pointer;
  border-left: 3px solid #2196F3;
  transition: all 0.2s ease;
}

.playlist-item:hover {
  background: rgba(33, 150, 243, 0.2);
}

.playlist-item.active {
  background: rgba(33, 150, 243, 0.3);
  border-left: 3px solid #64B5F6;
}

.playlist-item-name {
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  color: #fff;
}

.playlist-item-remove {
  background: rgba(255, 107, 107, 0.3);
  color: #ff6b6b;
  border: 1px solid #ff6b6b;
  padding: 4px 8px;
  border-radius: 3px;
  font-size: 11px;
  cursor: pointer;
}

.playlist-item-remove:hover {
  background: rgba(255, 107, 107, 0.5);
}

/* Info Popup */
.info-popup {
  position: fixed;
  bottom: 150px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(33, 150, 243, 0.9);
  color: #fff;
  padding: 10px 20px;
  border-radius: 6px;
  font-size: 13px;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.3s ease;
  max-width: 80%;
  text-align: center;
  border: 1px solid #2196F3;
  box-shadow: 0 0 12px rgba(33, 150, 243, 0.6);
}

.info-popup.show {
  opacity: 1;
}

/* Gesture Indicators */
.gesture-indicator {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 48px;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.3s ease;
  z-index: 100;
}

.gesture-indicator.show {
  opacity: 1;
}

.brightness-indicator {
  position: absolute;
  top: 50%;
  right: 20px;
  transform: translateY(-50%);
  width: 60px;
  height: 150px;
  background: rgba(33, 150, 243, 0.7);
  border-radius: 8px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: space-between;
  padding: 10px;
  font-size: 10px;
  color: #fff;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.3s ease;
  z-index: 50;
  border: 1px solid #2196F3;
}

.brightness-indicator.show {
  opacity: 1;
}

.brightness-bars {
  display: flex;
  flex-direction: column;
  gap: 2px;
  flex: 1;
  width: 6px;
}

.brightness-bar {
  flex: 1;
  background: rgba(255,255,255,0.2);
  border-radius: 2px;
}

.brightness-bar.active {
  background: #2196F3;
}

/* History Modal */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0, 0, 0, 0.8);
  display: none;
  align-items: flex-end;
  z-index: 1000;
}

.modal.show {
  display: flex;
}

.modal-content {
  width: 100%;
  background: #0a0a0a;
  border-top: 2px solid #2196F3;
  max-height: 70vh;
  overflow-y: auto;
  padding: 20px;
  border-radius: 12px 12px 0 0;
}

.modal-header {
  font-size: 18px;
  font-weight: 700;
  color: #2196F3;
  margin-bottom: 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.modal-close {
  font-size: 24px;
  cursor: pointer;
  color: #888;
}

.history-item {
  background: rgba(33, 150, 243, 0.1);
  padding: 12px;
  border-radius: 6px;
  margin-bottom: 10px;
  border-left: 3px solid #2196F3;
  cursor: pointer;
  transition: all 0.2s ease;
}

.history-item:hover {
  background: rgba(33, 150, 243, 0.2);
}

.history-item-title {
  font-size: 13px;
  font-weight: 600;
  color: #fff;
  margin-bottom: 4px;
}

.history-item-time {
  font-size: 11px;
  color: #888;
}

.history-empty {
  text-align: center;
  color: #666;
  padding: 40px 20px;
}

/* Mobile optimizations */
@media (max-width: 768px) {
  .controls-overlay {
    padding: 30px 12px 12px;
  }
  
  .slider-container {
    min-width: 90px;
  }
  
  input[type="range"] {
    width: 60px;
  }
  
  .file-section {
    max-height: 100px;
  }
  
  .control-center {
    gap: 4px;
  }
}
</style>
</head>
<body>

<div class="container">
  <!-- Video Player -->
  <div class="video-section" id="videoSection">
    <video id="videoPlayer"></video>
    <div class="video-no-file" id="noFileText">📁 Select a video file to start</div>
    
    <!-- Resume Popup -->
    <div class="resume-popup" id="resumePopup">
      <h3>▶️ Resume Video?</h3>
      <p id="resumeTime"></p>
      <div class="resume-popup-buttons">
        <button onclick="resumeVideo()">Resume</button>
        <button class="secondary" onclick="startFromBeginning()">Start from Beginning</button>
      </div>
    </div>
    
    <!-- Gesture Indicators -->
    <div class="gesture-indicator" id="gestureIndicator"></div>
    <div class="brightness-indicator" id="brightnessIndicator">
      <span>☀️</span>
      <div class="brightness-bars" id="brightnessBars"></div>
      <span>0%</span>
    </div>
    
    <!-- Controls Overlay -->
    <div class="controls-overlay" id="controlsOverlay">
      <!-- BLUE PROGRESS BOX -->
      <div class="progress-container" id="progressContainer">
        <div class="progress-box" id="progressBar">
          <div class="progress-fill" id="progressFill"></div>
          <div class="progress-handle" id="progressHandle"></div>
        </div>
        <div class="time-display">
          <span id="currentTime">0:00</span>
          <span id="duration">0:00</span>
        </div>
      </div>
      
      <div class="controls-buttons">
        <!-- Left Controls: Volume & Brightness -->
        <div class="control-left">
          <div class="slider-container">
            <span class="slider-label">🔊</span>
            <input type="range" id="volumeSlider" min="0" max="100" value="100" title="Volume">
          </div>
          
          <div class="slider-container">
            <span class="slider-label">☀️</span>
            <input type="range" id="brightnessSlider" min="0" max="200" value="100" title="Brightness">
          </div>
        </div>
        
        <!-- Center Controls: Play/Pause -->
        <div class="control-center">
          <button id="prevBtn" title="-10s">-10</button>
          <button id="playBtn" class="play-btn" title="Play/Pause">▶</button>
          <button id="nextBtn" title="+10s">+10</button>
        </div>
        
        <!-- Right Controls -->
        <div class="control-right">
          <div class="slider-container">
            <span class="slider-label">⚡</span>
            <input type="range" id="speedSlider" min="0.5" max="2" step="0.25" value="1" title="Speed">
          </div>
          <button id="boostBtn" title="Audio Boost +50%">🔊+</button>
          <button id="zoomBtn" title="Zoom">🔍</button>
          <button id="fullscreenBtn" title="Fullscreen">⛶</button>
        </div>
      </div>
    </div>
  </div>
  
  <!-- File Input Section -->
  <div class="file-section">
    <div class="file-input-wrapper">
      <button class="file-btn" onclick="document.getElementById('videoInput').click()">📁 Add Video</button>
      <input type="file" id="videoInput" accept="video/*" multiple />
      <button class="secondary-btn" id="historyBtn">📜 History</button>
      <button class="file-clear" id="clearBtn" style="display: none;">Clear All</button>
    </div>
    
    <!-- Playlist -->
    <div class="playlist-container" id="playlistContainer"></div>
  </div>
  
  <!-- Info Popup -->
  <div class="info-popup" id="infoPopup"></div>

  <!-- History Modal -->
  <div class="modal" id="historyModal">
    <div class="modal-content">
      <div class="modal-header">
        <span>📜 Playback History</span>
        <span class="modal-close" onclick="document.getElementById('historyModal').classList.remove('show')">✕</span>
      </div>
      <div id="historyList"></div>
    </div>
  </div>
</div>

<script>
const video = document.getElementById('videoPlayer');
const playBtn = document.getElementById('playBtn');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const volumeSlider = document.getElementById('volumeSlider');
const brightnessSlider = document.getElementById('brightnessSlider');
const speedSlider = document.getElementById('speedSlider');
const boostBtn = document.getElementById('boostBtn');
const zoomBtn = document.getElementById('zoomBtn');
const fullscreenBtn = document.getElementById('fullscreenBtn');
const progressBar = document.getElementById('progressBar');
const progressFill = document.getElementById('progressFill');
const progressHandle = document.getElementById('progressHandle');
const currentTimeEl = document.getElementById('currentTime');
const durationEl = document.getElementById('duration');
const controlsOverlay = document.getElementById('controlsOverlay');
const videoSection = document.getElementById('videoSection');
const clearBtn = document.getElementById('clearBtn');
const videoInput = document.getElementById('videoInput');
const noFileText = document.getElementById('noFileText');
const gestureIndicator = document.getElementById('gestureIndicator');
const brightnessIndicator = document.getElementById('brightnessIndicator');
const infoPopup = document.getElementById('infoPopup');
const historyBtn = document.getElementById('historyBtn');
const historyModal = document.getElementById('historyModal');
const historyList = document.getElementById('historyList');
const playlistContainer = document.getElementById('playlistContainer');
const resumePopup = document.getElementById('resumePopup');

// State Variables
let hideControlsTimeout;
let videoBrightness = 100;
let lastTapTime = 0;
let lastTapX = 0;
let touchStartY = 0;
let touchStartX = 0;
let isAudioBoosted = false;
let zoomLevel = 0;
let playbackHistory = JSON.parse(localStorage.getItem('videoHistory')) || [];
let playlist = [];
let currentPlaylistIndex = -1;
let resumeData = JSON.parse(localStorage.getItem('resumeData')) || {};
let shouldShowResumePopup = true;

// ===== FORMAT TIME =====
function formatTime(seconds) {
  if (isNaN(seconds)) return '0:00';
  const hrs = Math.floor(seconds / 3600);
  const mins = Math.floor((seconds % 3600) / 60);
  const secs = Math.floor(seconds % 60);
  
  if (hrs > 0) {
    return `${hrs}:${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
  }
  return `${mins}:${secs.toString().padStart(2, '0')}`;
}

// ===== SHOW INFO =====
function showInfo(text) {
  infoPopup.textContent = text;
  infoPopup.classList.add('show');
  setTimeout(() => infoPopup.classList.remove('show'), 2000);
}

// ===== RESUME FEATURE =====
function savePlaybackPosition() {
  if (currentPlaylistIndex >= 0 && playlist[currentPlaylistIndex]) {
    const fileName = playlist[currentPlaylistIndex].name;
    resumeData[fileName] = {
      time: video.currentTime,
      duration: video.duration,
      timestamp: Date.now()
    };
    localStorage.setItem('resumeData', JSON.stringify(resumeData));
  }
}

function checkResumePosition(fileName) {
  if (resumeData[fileName] && shouldShowResumePopup) {
    const data = resumeData[fileName];
    const resumeTime = formatTime(data.time);
    document.getElementById('resumeTime').textContent = `Resume from ${resumeTime}?`;
    resumePopup.classList.add('show');
    shouldShowResumePopup = false;
    return true;
  }
  return false;
}

function resumeVideo() {
  if (currentPlaylistIndex >= 0 && playlist[currentPlaylistIndex]) {
    const fileName = playlist[currentPlaylistIndex].name;
    if (resumeData[fileName]) {
      video.currentTime = resumeData[fileName].time;
      video.play();
      resumePopup.classList.remove('show');
    }
  }
}

function startFromBeginning() {
  video.currentTime = 0;
  video.play();
  resumePopup.classList.remove('show');
}

// ===== PLAYBACK HISTORY =====
function addToHistory(fileName) {
  const entry = {
    id: Date.now(),
    name: fileName,
    date: new Date().toLocaleString(),
    timestamp: new Date().getTime()
  };
  
  playbackHistory = playbackHistory.filter(item => item.name !== fileName);
  playbackHistory.unshift(entry);
  playbackHistory = playbackHistory.slice(0, 50);
  
  localStorage.setItem('videoHistory', JSON.stringify(playbackHistory));
  updateHistoryUI();
}

function updateHistoryUI() {
  if (playbackHistory.length === 0) {
    historyList.innerHTML = '<div class="history-empty">No playback history</div>';
    return;
  }
  
  historyList.innerHTML = playbackHistory.map(item => `
    <div class="history-item" onclick="loadFromHistory('${item.name}')">
      <div class="history-item-title">📁 ${item.name}</div>
      <div class="history-item-time">${item.date}</div>
    </div>
  `).join('');
}

function loadFromHistory(fileName) {
  const fileItem = playlist.find(f => f.name === fileName);
  if (fileItem) {
    loadVideo(fileItem);
    historyModal.classList.remove('show');
  }
}

// ===== PLAYLIST MANAGEMENT =====
function addToPlaylist(files) {
  for (let file of files) {
    const url = URL.createObjectURL(file);
    playlist.push({ name: file.name, url: url });
  }
  updatePlaylistUI();
  
  if (playlist.length > 0 && currentPlaylistIndex === -1) {
    loadVideo(playlist[0]);
  }
}

function updatePlaylistUI() {
  playlistContainer.innerHTML = playlist.map((item, idx) => `
    <div class="playlist-item ${idx === currentPlaylistIndex ? 'active' : ''}" onclick="loadPlaylistItem(${idx})">
      <span class="playlist-item-name">${idx + 1}. ${item.name}</span>
      <button class="playlist-item-remove" onclick="event.stopPropagation(); removeFromPlaylist(${idx})">Remove</button>
    </div>
  `).join('');
  
  if (playlist.length > 0) {
    clearBtn.style.display = 'block';
  }
}

function loadPlaylistItem(idx) {
  savePlaybackPosition();
  currentPlaylistIndex = idx;
  shouldShowResumePopup = true;
  loadVideo(playlist[idx]);
  updatePlaylistUI();
}

function loadVideo(item) {
  video.src = item.url;
  noFileText.style.display = 'none';
  addToHistory(item.name);
  showInfo('✓ Playing: ' + item.name);
  
  // Check for resume
  setTimeout(() => {
    if (checkResumePosition(item.name)) {
      // Resume popup will show
    }
  }, 500);
  
  isAudioBoosted = false;
  boostBtn.style.opacity = '1';
  zoomLevel = 0;
  video.className = 'zoom-1';
}

function removeFromPlaylist(idx) {
  if (confirm(`Remove ${playlist[idx].name}?`)) {
    playlist.splice(idx, 1);
    if (currentPlaylistIndex === idx) {
      if (playlist.length > 0) {
        loadPlaylistItem(0);
      } else {
        video.src = '';
        noFileText.style.display = 'block';
        currentPlaylistIndex = -1;
      }
    } else if (currentPlaylistIndex > idx) {
      currentPlaylistIndex--;
    }
    updatePlaylistUI();
  }
}

function clearPlaylist() {
  if (confirm('Clear entire playlist?')) {
    playlist = [];
    currentPlaylistIndex = -1;
    video.src = '';
    noFileText.style.display = 'block';
    clearBtn.style.display = 'none';
    updatePlaylistUI();
  }
}

// ===== FILE SELECTION =====
videoInput.addEventListener('change', (e) => {
  const files = Array.from(e.target.files);
  if (files.length > 0) {
    addToPlaylist(files);
    videoInput.value = '';
  }
});

clearBtn.addEventListener('click', clearPlaylist);

// ===== VIDEO EVENTS =====
video.addEventListener('loadedmetadata', () => {
  durationEl.textContent = formatTime(video.duration);
});

video.addEventListener('timeupdate', () => {
  savePlaybackPosition();
  const percent = (video.currentTime / video.duration) * 100;
  progressFill.style.width = percent + '%';
  progressHandle.style.left = percent + '%';
  currentTimeEl.textContent = formatTime(video.currentTime);
});

video.addEventListener('ended', () => {
  if (currentPlaylistIndex < playlist.length - 1) {
    loadPlaylistItem(currentPlaylistIndex + 1);
  } else {
    playBtn.textContent = '▶';
  }
});

// ===== PLAY/PAUSE =====
playBtn.addEventListener('click', () => {
  if (video.src === '') return;
  if (video.paused) {
    video.play();
    playBtn.textContent = '⏸';
  } else {
    video.pause();
    playBtn.textContent = '▶';
  }
});

video.addEventListener('play', () => { playBtn.textContent = '⏸'; });
video.addEventListener('pause', () => { playBtn.textContent = '▶'; });

// ===== SKIP BUTTONS =====
prevBtn.addEventListener('click', () => {
  if (video.src === '') return;
  video.currentTime = Math.max(0, video.currentTime - 10);
  showInfo('⏮ -10s');
});

nextBtn.addEventListener('click', () => {
  if (video.src === '') return;
  video.currentTime = Math.min(video.duration, video.currentTime + 10);
  showInfo('⏭ +10s');
});

// ===== VOLUME CONTROL =====
volumeSlider.addEventListener('input', (e) => {
  let vol = e.target.value / 100;
  
  if (isAudioBoosted) {
    vol = Math.min(1, vol * 1.5);
  }
  
  video.volume = vol;
});

// ===== BRIGHTNESS CONTROL =====
brightnessSlider.addEventListener('input', (e) => {
  videoBrightness = parseInt(e.target.value);
  video.style.filter = `brightness(${videoBrightness}%)`;
  showInfo(`☀️ Brightness: ${videoBrightness}%`);
});

// ===== AUDIO BOOST =====
boostBtn.addEventListener('click', () => {
  if (video.src === '') return;
  isAudioBoosted = !isAudioBoosted;
  
  let vol = volumeSlider.value / 100;
  if (isAudioBoosted) {
    vol = Math.min(1, vol * 1.5);
    boostBtn.style.opacity = '0.5';
    boostBtn.style.textShadow = '0 0 10px rgba(33, 150, 243, 0.8)';
    showInfo('🔊 Audio Boost: ON (+50%)');
  } else {
    boostBtn.style.opacity = '1';
    boostBtn.style.textShadow = 'none';
    showInfo('🔊 Audio Boost: OFF');
  }
  
  video.volume = vol;
});

// ===== SPEED CONTROL =====
speedSlider.addEventListener('input', (e) => {
  if (video.src === '') return;
  video.playbackRate = parseFloat(e.target.value);
  showInfo(`Speed: ${e.target.value}x`);
});

// ===== VIDEO ZOOM =====
zoomBtn.addEventListener('click', () => {
  if (video.src === '') return;
  zoomLevel = (zoomLevel + 1) % 3;
  const zoomLevels = ['zoom-1', 'zoom-1-2', 'zoom-1-5'];
  const zoomTexts = ['100%', '120%', '150%'];
  
  video.className = zoomLevels[zoomLevel];
  showInfo(`🔍 Zoom: ${zoomTexts[zoomLevel]}`);
});

// ===== FULLSCREEN =====
fullscreenBtn.addEventListener('click', () => {
  if (video.src === '') return;
  if (!document.fullscreenElement) {
    videoSection.requestFullscreen().catch(err => {
      console.error('Fullscreen error:', err);
    });
  } else {
    document.exitFullscreen();
  }
});

// ===== HISTORY BUTTON =====
historyBtn.addEventListener('click', () => {
  updateHistoryUI();
  historyModal.classList.add('show');
});

// ===== PROGRESS BAR CLICK =====
progressBar.addEventListener('click', (e) => {
  if (video.src === '') return;
  const rect = progressBar.getBoundingClientRect();
  const percent = (e.clientX - rect.left) / rect.width;
  video.currentTime = percent * video.duration;
});

// ===== CONTROLS AUTO-HIDE =====
function showControls() {
  controlsOverlay.classList.add('visible');
  clearTimeout(hideControlsTimeout);
  
  if (!video.paused) {
    hideControlsTimeout = setTimeout(() => {
      controlsOverlay.classList.remove('visible');
    }, 3000);
  }
}

videoSection.addEventListener('mousemove', () => {
  if (video.src) showControls();
});

videoSection.addEventListener('mouseenter', () => {
  if (video.src) showControls();
});

// ===== TOUCH CONTROLS =====
videoSection.addEventListener('touchstart', (e) => {
  if (!video.src) return;
  touchStartY = e.touches[0].clientY;
  touchStartX = e.touches[0].clientX;
  
  const now = Date.now();
  const doubleTapDelay = 300;
  
  if (now - lastTapTime < doubleTapDelay && Math.abs(e.touches[0].clientX - lastTapX) < 50) {
    const videoSectionWidth = videoSection.offsetWidth;
    const doubleTapX = e.touches[0].clientX;
    
    if (doubleTapX < videoSectionWidth / 3) {
      video.currentTime = Math.max(0, video.currentTime - 10);
      gestureIndicator.textContent = '⏮ -10s';
    } else if (doubleTapX > (videoSectionWidth * 2) / 3) {
      video.currentTime = Math.min(video.duration, video.currentTime + 10);
      gestureIndicator.textContent = '⏭ +10s';
    } else {
      if (video.paused) {
        video.play();
      } else {
        video.pause();
      }
      gestureIndicator.textContent = video.paused ? '⏸' : '▶';
    }
    
    gestureIndicator.classList.add('show');
    setTimeout(() => gestureIndicator.classList.remove('show'), 600);
  }
  
  lastTapTime = now;
  lastTapX = e.touches[0].clientX;
});

videoSection.addEventListener('touchmove', (e) => {
  if (!video.src) return;
  
  const currentY = e.touches[0].clientY;
  const currentX = e.touches[0].clientX;
  const deltaY = touchStartY - currentY;
  const deltaX = currentX - touchStartX;
  
  if (Math.abs(deltaY) > Math.abs(deltaX) && Math.abs(deltaY) > 20) {
    e.preventDefault();
    const brightnessChange = (deltaY / videoSection.offsetHeight) * 50;
    videoBrightness = Math.max(0, Math.min(200, videoBrightness + brightnessChange));
    video.style.filter = `brightness(${videoBrightness}%)`;
    
    const bars = document.getElementById('brightnessBars');
    const activeCount = Math.ceil((videoBrightness / 200) * 10);
    bars.innerHTML = '';
    for (let i = 0; i < 10; i++) {
      const bar = document.createElement('div');
      bar.className = 'brightness-bar' + (i < activeCount ? ' active' : '');
      bars.appendChild(bar);
    }
    brightnessIndicator.classList.add('show');
  }
});

videoSection.addEventListener('touchend', () => {
  brightnessIndicator.classList.remove('show');
});

// ===== KEYBOARD SHORTCUTS =====
document.addEventListener('keydown', (e) => {
  if (!video.src) return;
  
  switch(e.key.toLowerCase()) {
    case ' ':
      e.preventDefault();
      playBtn.click();
      break;
    case 'arrowleft':
      video.currentTime = Math.max(0, video.currentTime - 5);
      break;
    case 'arrowright':
      video.currentTime = Math.min(video.duration, video.currentTime + 5);
      break;
    case 'arrowup':
      e.preventDefault();
      video.volume = Math.min(1, video.volume + 0.1);
      volumeSlider.value = video.volume * 100;
      break;
    case 'arrowdown':
      e.preventDefault();
      video.volume = Math.max(0, video.volume - 0.1);
      volumeSlider.value = video.volume * 100;
      break;
    case 'f':
      fullscreenBtn.click();
      break;
    case 'm':
      video.volume = video.volume === 0 ? 0.5 : 0;
      volumeSlider.value = video.volume * 100;
      break;
    case 'z':
      zoomBtn.click();
      break;
    case 'b':
      boostBtn.click();
      break;
  }
});

// Initialize brightness bars
for (let i = 0; i < 10; i++) {
  const bar = document.createElement('div');
  bar.className = 'brightness-bar' + (i < 5 ? ' active' : '');
  document.getElementById('brightnessBars').appendChild(bar);
}

// Load history on startup
updateHistoryUI();
updatePlaylistUI();

console.log('🎬 MX Player Blue Edition with Resume & Playlist Ready!\nFeatures: Auto-Resume from last position, Multiple videos playlist, Auto-play next video');
</script>

</body>
</html>
