<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>MX Player - Old Style</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #000;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  color: #fff;
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
}

.container {
  width: 100%;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

/* Video Player Section */
.video-section {
  flex: 1;
  position: relative;
  background: #000;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

video {
  max-width: 100%;
  max-height: 100%;
  width: auto;
  height: auto;
}

.video-no-file {
  text-align: center;
  color: #888;
  font-size: 16px;
}

/* Controls Overlay */
.controls-overlay {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
  padding: 40px 16px 16px;
  opacity: 0;
  transition: opacity 0.3s ease;
  z-index: 10;
}

.controls-overlay.visible {
  opacity: 1;
}

/* Progress Bar */
.progress-container {
  margin-bottom: 16px;
  cursor: pointer;
}

.progress-bar {
  width: 100%;
  height: 3px;
  background: rgba(255,255,255,0.2);
  border-radius: 2px;
  position: relative;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: #ff6b00;
  width: 0%;
  transition: width 0.1s linear;
}

.progress-handle {
  position: absolute;
  width: 12px;
  height: 12px;
  background: #ff6b00;
  border-radius: 50%;
  top: -4.5px;
  left: 0%;
  box-shadow: 0 0 8px rgba(255,107,0,0.5);
  opacity: 0;
  transition: opacity 0.3s ease;
}

.progress-bar:hover .progress-handle {
  opacity: 1;
}

.time-display {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: #aaa;
  margin-top: 6px;
  font-family: monospace;
}

/* Control Buttons */
.controls-buttons {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
}

.control-left {
  display: flex;
  gap: 12px;
  align-items: center;
}

.control-right {
  display: flex;
  gap: 12px;
  align-items: center;
}

.control-center {
  display: flex;
  gap: 8px;
  flex: 1;
  justify-content: center;
  align-items: center;
}

button {
  background: none;
  border: none;
  color: #fff;
  font-size: 20px;
  cursor: pointer;
  padding: 8px;
  border-radius: 50%;
  transition: background 0.2s ease;
  display: flex;
  align-items: center;
  justify-content: center;
}

button:hover {
  background: rgba(255,255,255,0.1);
}

button:active {
  background: rgba(255,255,255,0.2);
}

.play-btn {
  width: 44px;
  height: 44px;
  background: rgba(255,107,0,0.2);
  border: 2px solid #ff6b00;
}

.play-btn:hover {
  background: rgba(255,107,0,0.3);
}

/* Sliders */
.slider-container {
  display: flex;
  align-items: center;
  gap: 8px;
  min-width: 140px;
}

input[type="range"] {
  width: 100px;
  height: 2px;
  -webkit-appearance: none;
  appearance: none;
  background: rgba(255,255,255,0.2);
  border-radius: 2px;
  outline: none;
  cursor: pointer;
}

input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 10px;
  height: 10px;
  background: #ff6b00;
  border-radius: 50%;
  cursor: pointer;
}

input[type="range"]::-moz-range-thumb {
  width: 10px;
  height: 10px;
  background: #ff6b00;
  border-radius: 50%;
  cursor: pointer;
  border: none;
}

.slider-label {
  font-size: 12px;
  color: #aaa;
  min-width: 20px;
}

/* File Input Section */
.file-section {
  background: #1a1a1a;
  padding: 12px 16px;
  border-top: 1px solid #333;
  max-height: 80px;
  overflow-y: auto;
}

.file-input-wrapper {
  display: flex;
  gap: 10px;
  align-items: center;
}

.file-input-wrapper input[type="file"] {
  display: none;
}

.file-btn {
  background: #ff6b00;
  color: #000;
  padding: 8px 16px;
  border-radius: 4px;
  font-weight: 600;
  font-size: 13px;
}

.file-btn:hover {
  background: #ff8533;
}

.file-name {
  font-size: 12px;
  color: #aaa;
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.file-clear {
  background: rgba(255,255,255,0.1);
  color: #fff;
  padding: 6px 12px;
  border-radius: 4px;
  font-size: 12px;
}

.file-clear:hover {
  background: rgba(255,255,255,0.2);
}

/* Info Popup */
.info-popup {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.9);
  color: #aaa;
  padding: 8px 16px;
  border-radius: 4px;
  font-size: 12px;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.3s ease;
  max-width: 80%;
  text-align: center;
}

.info-popup.show {
  opacity: 1;
}

/* Fullscreen Styles */
.video-section:fullscreen {
  width: 100%;
  height: 100%;
}

video:fullscreen {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

/* Gesture Indicators */
.gesture-indicator {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 48px;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.3s ease;
  z-index: 100;
}

.gesture-indicator.show {
  opacity: 1;
}

.brightness-indicator {
  position: absolute;
  top: 50%;
  right: 20px;
  transform: translateY(-50%);
  width: 60px;
  height: 150px;
  background: rgba(0,0,0,0.7);
  border-radius: 8px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: space-between;
  padding: 10px;
  font-size: 10px;
  color: #aaa;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.3s ease;
  z-index: 50;
}

.brightness-indicator.show {
  opacity: 1;
}

.brightness-bars {
  display: flex;
  flex-direction: column;
  gap: 2px;
  flex: 1;
  width: 6px;
}

.brightness-bar {
  flex: 1;
  background: rgba(255,255,255,0.2);
  border-radius: 2px;
}

.brightness-bar.active {
  background: #ff6b00;
}

/* Mobile optimizations */
@media (max-width: 768px) {
  .controls-overlay {
    padding: 30px 12px 12px;
  }
  
  .slider-container {
    min-width: 100px;
  }
  
  input[type="range"] {
    width: 70px;
  }
  
  .file-section {
    max-height: 60px;
  }
}
</style>
</head>
<body>

<div class="container">
  <!-- Video Player -->
  <div class="video-section" id="videoSection">
    <video id="videoPlayer"></video>
    <div class="video-no-file" id="noFileText">📁 Select a video file to start</div>
    
    <!-- Gesture Indicators -->
    <div class="gesture-indicator" id="gestureIndicator"></div>
    <div class="brightness-indicator" id="brightnessIndicator">
      <span>☀️</span>
      <div class="brightness-bars" id="brightnessBars"></div>
      <span>0%</span>
    </div>
    
    <!-- Controls Overlay -->
    <div class="controls-overlay" id="controlsOverlay">
      <div class="progress-container" id="progressContainer">
        <div class="progress-bar" id="progressBar">
          <div class="progress-fill" id="progressFill"></div>
          <div class="progress-handle" id="progressHandle"></div>
        </div>
        <div class="time-display">
          <span id="currentTime">0:00</span>
          <span id="duration">0:00</span>
        </div>
      </div>
      
      <div class="controls-buttons">
        <!-- Left Controls -->
        <div class="control-left">
          <button id="prevBtn" title="Previous 10s">⏮</button>
          <button id="playBtn" class="play-btn" title="Play/Pause">▶</button>
          <button id="nextBtn" title="Next 10s">⏭</button>
        </div>
        
        <!-- Center Controls -->
        <div class="control-center">
          <div class="slider-container">
            <span class="slider-label">🔊</span>
            <input type="range" id="volumeSlider" min="0" max="100" value="100" title="Volume">
          </div>
          
          <div class="slider-container">
            <span class="slider-label">⚡</span>
            <input type="range" id="speedSlider" min="0.5" max="2" step="0.25" value="1" title="Speed">
          </div>
        </div>
        
        <!-- Right Controls -->
        <div class="control-right">
          <button id="subtitleBtn" title="Subtitle (Not loaded)">CC</button>
          <button id="fullscreenBtn" title="Fullscreen">⛶</button>
        </div>
      </div>
    </div>
  </div>
  
  <!-- File Input Section -->
  <div class="file-section">
    <div class="file-input-wrapper">
      <button class="file-btn" onclick="document.getElementById('videoInput').click()">📁 Open File</button>
      <input type="file" id="videoInput" accept="video/*" />
      <span class="file-name" id="fileName">No file selected</span>
      <button class="file-clear" id="clearBtn" style="display: none;">Clear</button>
    </div>
  </div>
  
  <!-- Info Popup -->
  <div class="info-popup" id="infoPopup"></div>
</div>

<script>
const video = document.getElementById('videoPlayer');
const playBtn = document.getElementById('playBtn');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const volumeSlider = document.getElementById('volumeSlider');
const speedSlider = document.getElementById('speedSlider');
const fullscreenBtn = document.getElementById('fullscreenBtn');
const subtitleBtn = document.getElementById('subtitleBtn');
const progressBar = document.getElementById('progressBar');
const progressFill = document.getElementById('progressFill');
const progressHandle = document.getElementById('progressHandle');
const currentTimeEl = document.getElementById('currentTime');
const durationEl = document.getElementById('duration');
const controlsOverlay = document.getElementById('controlsOverlay');
const videoSection = document.getElementById('videoSection');
const fileNameEl = document.getElementById('fileName');
const clearBtn = document.getElementById('clearBtn');
const videoInput = document.getElementById('videoInput');
const noFileText = document.getElementById('noFileText');
const gestureIndicator = document.getElementById('gestureIndicator');
const brightnessIndicator = document.getElementById('brightnessIndicator');
const infoPopup = document.getElementById('infoPopup');

// State Variables
let hideControlsTimeout;
let videoBrightness = 100;
let lastTapTime = 0;
let lastTapX = 0;
let touchStartY = 0;
let touchStartX = 0;
let isVolumeDrag = false;
let isBrightnessDrag = false;

// ===== FORMAT TIME =====
function formatTime(seconds) {
  if (isNaN(seconds)) return '0:00';
  const hrs = Math.floor(seconds / 3600);
  const mins = Math.floor((seconds % 3600) / 60);
  const secs = Math.floor(seconds % 60);
  
  if (hrs > 0) {
    return `${hrs}:${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
  }
  return `${mins}:${secs.toString().padStart(2, '0')}`;
}

// ===== SHOW INFO =====
function showInfo(text) {
  infoPopup.textContent = text;
  infoPopup.classList.add('show');
  setTimeout(() => infoPopup.classList.remove('show'), 2000);
}

// ===== FILE SELECTION =====
videoInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (file) {
    const url = URL.createObjectURL(file);
    video.src = url;
    fileNameEl.textContent = file.name;
    clearBtn.style.display = 'block';
    noFileText.style.display = 'none';
    showInfo('Video loaded: ' + file.name);
  }
});

clearBtn.addEventListener('click', () => {
  video.src = '';
  fileNameEl.textContent = 'No file selected';
  clearBtn.style.display = 'none';
  noFileText.style.display = 'block';
  videoInput.value = '';
});

// ===== VIDEO EVENTS =====
video.addEventListener('loadedmetadata', () => {
  durationEl.textContent = formatTime(video.duration);
});

video.addEventListener('timeupdate', () => {
  const percent = (video.currentTime / video.duration) * 100;
  progressFill.style.width = percent + '%';
  progressHandle.style.left = percent + '%';
  currentTimeEl.textContent = formatTime(video.currentTime);
});

// ===== PLAY/PAUSE =====
playBtn.addEventListener('click', () => {
  if (video.paused) {
    video.play();
    playBtn.textContent = '⏸';
  } else {
    video.pause();
    playBtn.textContent = '▶';
  }
});

video.addEventListener('play', () => { playBtn.textContent = '⏸'; });
video.addEventListener('pause', () => { playBtn.textContent = '▶'; });

// ===== SKIP BUTTONS =====
prevBtn.addEventListener('click', () => {
  video.currentTime = Math.max(0, video.currentTime - 10);
  showInfo('⏮ -10s');
});

nextBtn.addEventListener('click', () => {
  video.currentTime = Math.min(video.duration, video.currentTime + 10);
  showInfo('⏭ +10s');
});

// ===== VOLUME CONTROL =====
volumeSlider.addEventListener('input', (e) => {
  video.volume = e.target.value / 100;
});

// ===== SPEED CONTROL =====
speedSlider.addEventListener('input', (e) => {
  video.playbackRate = parseFloat(e.target.value);
  showInfo(`Speed: ${e.target.value}x`);
});

// ===== FULLSCREEN =====
fullscreenBtn.addEventListener('click', () => {
  if (!document.fullscreenElement) {
    videoSection.requestFullscreen().catch(err => {
      console.error('Fullscreen error:', err);
    });
  } else {
    document.exitFullscreen();
  }
});

// ===== PROGRESS BAR CLICK =====
progressBar.addEventListener('click', (e) => {
  const rect = progressBar.getBoundingClientRect();
  const percent = (e.clientX - rect.left) / rect.width;
  video.currentTime = percent * video.duration;
});

// ===== CONTROLS AUTO-HIDE =====
function showControls() {
  controlsOverlay.classList.add('visible');
  clearTimeout(hideControlsTimeout);
  
  if (!video.paused) {
    hideControlsTimeout = setTimeout(() => {
      controlsOverlay.classList.remove('visible');
    }, 3000);
  }
}

videoSection.addEventListener('mousemove', () => {
  if (video.src) showControls();
});

videoSection.addEventListener('mouseenter', () => {
  if (video.src) showControls();
});

// ===== TOUCH CONTROLS =====
let touchStartTime = 0;

videoSection.addEventListener('touchstart', (e) => {
  touchStartY = e.touches[0].clientY;
  touchStartX = e.touches[0].clientX;
  touchStartTime = Date.now();
  
  // Double tap detection
  const now = Date.now();
  const doubleTapDelay = 300;
  
  if (now - lastTapTime < doubleTapDelay && Math.abs(e.touches[0].clientX - lastTapX) < 50) {
    // Double tap detected
    const videoSectionWidth = videoSection.offsetWidth;
    const doubleTapX = e.touches[0].clientX;
    
    if (doubleTapX < videoSectionWidth / 3) {
      // Left side - go back
      video.currentTime = Math.max(0, video.currentTime - 10);
      gestureIndicator.textContent = '⏮ -10s';
    } else if (doubleTapX > (videoSectionWidth * 2) / 3) {
      // Right side - go forward
      video.currentTime = Math.min(video.duration, video.currentTime + 10);
      gestureIndicator.textContent = '⏭ +10s';
    } else {
      // Center - play/pause
      if (video.paused) {
        video.play();
      } else {
        video.pause();
      }
      gestureIndicator.textContent = video.paused ? '⏸' : '▶';
    }
    
    gestureIndicator.classList.add('show');
    setTimeout(() => gestureIndicator.classList.remove('show'), 600);
  }
  
  lastTapTime = now;
  lastTapX = e.touches[0].clientX;
});

videoSection.addEventListener('touchmove', (e) => {
  if (!video.src) return;
  
  const currentY = e.touches[0].clientY;
  const currentX = e.touches[0].clientX;
  const deltaY = touchStartY - currentY;
  const deltaX = currentX - touchStartX;
  
  // Vertical swipe - brightness control
  if (Math.abs(deltaY) > Math.abs(deltaX) && Math.abs(deltaY) > 20) {
    e.preventDefault();
    const brightnessChange = (deltaY / videoSection.offsetHeight) * 50;
    videoBrightness = Math.max(0, Math.min(200, videoBrightness + brightnessChange));
    video.style.filter = `brightness(${videoBrightness}%)`;
    
    // Show brightness indicator
    const bars = document.getElementById('brightnessBars');
    const activeCount = Math.ceil((videoBrightness / 200) * 10);
    bars.innerHTML = '';
    for (let i = 0; i < 10; i++) {
      const bar = document.createElement('div');
      bar.className = 'brightness-bar' + (i < activeCount ? ' active' : '');
      bars.appendChild(bar);
    }
    brightnessIndicator.classList.add('show');
  }
});

videoSection.addEventListener('touchend', () => {
  brightnessIndicator.classList.remove('show');
});

// ===== KEYBOARD SHORTCUTS =====
document.addEventListener('keydown', (e) => {
  if (!video.src) return;
  
  switch(e.key.toLowerCase()) {
    case ' ':
      e.preventDefault();
      playBtn.click();
      break;
    case 'arrowleft':
      video.currentTime = Math.max(0, video.currentTime - 5);
      break;
    case 'arrowright':
      video.currentTime = Math.min(video.duration, video.currentTime + 5);
      break;
    case 'arrowup':
      e.preventDefault();
      video.volume = Math.min(1, video.volume + 0.1);
      volumeSlider.value = video.volume * 100;
      break;
    case 'arrowdown':
      e.preventDefault();
      video.volume = Math.max(0, video.volume - 0.1);
      volumeSlider.value = video.volume * 100;
      break;
    case 'f':
      fullscreenBtn.click();
      break;
    case 'm':
      video.volume = video.volume === 0 ? 0.5 : 0;
      volumeSlider.value = video.volume * 100;
      break;
  }
});

// ===== MOBILE ADJUSTMENTS =====
if (/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)) {
  // Mobile specific adjustments
  videoSection.addEventListener('dblclick', (e) => {
    e.preventDefault();
  });
}

// Initialize brightness bars
for (let i = 0; i < 10; i++) {
  const bar = document.createElement('div');
  bar.className = 'brightness-bar' + (i < 5 ? ' active' : '');
  document.getElementById('brightnessBars').appendChild(bar);
}

console.log('🎬 MX Player ready!\nKeyboard: SPACE=Play, ← →=Skip, ↑ ↓=Volume, F=Fullscreen, M=Mute');
</script>

</body>
</html>
